databases:
  - name: iubconnect-db
    databaseName: iubconnect
    user: iubconnect_user
    plan: free

services:
  - type: web
    name: iubconnect
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "daphne iubconnect.asgi:application --port $PORT --bind 0.0.0.0"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iubconnect-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
