{% extends "dashboard.html" %}
{% block title %}Announcements — IUB Connect{% endblock %}
{% block content %}
<div class="space-y" style="max-width:640px">
  <h1 class="page-title"><i data-lucide="megaphone" style="width:24px;height:24px;color:var(--primary-400)"></i> Send Announcement</h1>

  <div class="glass-card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label style="color:var(--dark-300);font-size:.875rem;font-weight:500">Target Audience</label>
        <select name="target_role" class="input-field">
          <option value="">Everyone</option>
          <option value="student">Students only</option>
          <option value="alumni">Alumni only</option>
        </select>
      </div>
      <div class="form-group">
        <label style="color:var(--dark-300);font-size:.875rem;font-weight:500">Message</label>
        <textarea name="message" class="input-field" rows="4" placeholder="Write your announcement..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">
        <i data-lucide="send" style="width:16px;height:16px"></i> Send Announcement
      </button>
    </form>
  </div>
</div>
{% endblock %}
